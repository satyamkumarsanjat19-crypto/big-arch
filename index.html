
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BIG ARCH</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(-45deg,#000,#111,#222,#000);
background-size:400% 400%;
animation:bg 15s ease infinite;
color:white;
overflow-x:hidden;
text-align:center;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.logo{
width:250px;
border-radius:50%;
animation:float 4s ease-in-out infinite;
filter:drop-shadow(0 0 40px gold);
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-20px);
}
}

h1{
font-size:70px;
color:gold;
text-shadow:0 0 30px gold;
}

h2{
font-size:30px;
margin-top:10px;
}

p{
font-size:20px;
max-width:700px;
margin-top:20px;
}

.buttons{
margin-top:40px;
}

.btn{
padding:15px 35px;
margin:10px;
border-radius:50px;
background:gold;
color:black;
font-weight:bold;
text-decoration:none;
display:inline-block;
transition:0.4s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px gold;
}

.section{
padding:80px 20px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
max-width:700px;
margin:auto;
box-shadow:0 0 30px rgba(255,215,0,0.3);
}

.coin{
position:absolute;
font-size:40px;
animation:fall linear infinite;
}

.coin:nth-child(1){
left:10%;
animation-duration:10s;
}

.coin:nth-child(2){
left:50%;
animation-duration:15s;
}

.coin:nth-child(3){
left:80%;
animation-duration:12s;
}

@keyframes fall{
0%{
transform:translateY(-100px);
}
100%{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<div class="coin">🪙</div>
<div class="coin">🍔</div>
<div class="coin">🚀</div>

<div class="hero">

<img src="YOUR_LOGO_LINK" class="logo">

<h1>BIG ARCH</h1>

<h2>🍔 Burger Coin To The Moon 🚀</h2>

<p>
The funniest burger meme coin on the blockchain.
Join the community and ride to the moon.
</p>

<div class="buttons">
<a href="#" class="btn">BUY NOW</a>
<a href="https://x.com/" class="btn">X</a>
<a href="#" class="btn">TELEGRAM</a>
</div>

</div>

<div class="section">
<div class="card">

<h2>Tokenomics</h2>

<br>

<p>
Total Supply : 1,000,000,000
<br><br>
Liquidity Locked 🔒
<br><br>
Community Driven ❤️
<br><br>
No Tax ✅
</p>

</div>
</div>

</body>
</html>
